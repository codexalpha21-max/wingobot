<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinGo 1M Live Data</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
h1 { color: #00d4ff; margin-bottom: 5px; font-size: 22px; }
.sub { color: #888; font-size: 13px; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
.card { background: #1a1a2e; border-radius: 8px; padding: 12px; text-align: center; border: 1px solid #2a2a4a; }
.card .period { font-size: 11px; color: #888; }
.card .number { font-size: 28px; font-weight: bold; margin: 4px 0; }
.card .category { font-size: 13px; font-weight: 600; padding: 2px 10px; border-radius: 10px; display: inline-block; }
.card .color { font-size: 11px; margin-top: 4px; }
.big { background: #e74c3c33; color: #e74c3c; border: 1px solid #e74c3c55; }
.small { background: #3498db33; color: #3498db; border: 1px solid #3498db55; }
.big-bg { background: linear-gradient(135deg, #e74c3c22, #c0392b22); }
.small-bg { background: linear-gradient(135deg, #3498db22, #2980b922); }
.stats { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
.stat-box { background: #1a1a2e; border-radius: 8px; padding: 12px 20px; border: 1px solid #2a2a4a; min-width: 100px; }
.stat-box .label { font-size: 11px; color: #888; }
.stat-box .value { font-size: 20px; font-weight: bold; color: #00d4ff; }
.loading { text-align: center; padding: 40px; color: #555; font-size: 16px; }
.error { text-align: center; padding: 20px; color: #e74c3c; }
.refresh { background: #00d4ff; color: #000; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; float: right; }
.refresh:hover { background: #00b8d4; }
</style>
</head>
<body>
<h1>WinGo 1 Minute</h1>
<div class="sub">Live draw history from API</div>
<button class="refresh" onclick="fetchData()">Refresh</button>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<script>
const API = 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json';

function getColor(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function fetchData() {
  document.getElementById('grid').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('stats').innerHTML = '';

  const ts = Date.now();
  fetch(`${API}?ts=${ts}&pageNo=1&pageSize=100`, {
    headers: { 'Accept': 'application/json, text/plain, */*' }
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    const list = data.data?.list || [];
    render(list);
  })
  .catch(err => {
    document.getElementById('grid').innerHTML = `<div class="error">Error: ${err.message}</div>`;
  });
}

function render(list) {
  let html = '';
  let big = 0, small = 0;
  const colorCount = {};

  list.forEach(item => {
    const num = parseInt(item.number);
    const cat = num <= 4 ? 'SMALL' : 'BIG';
    const cls = cat.toLowerCase();
    const col = item.color || '';

    if (cat === 'BIG') big++; else small++;
    colorCount[col] = (colorCount[col] || 0) + 1;

    html += `<div class="card ${cls}-bg">
      <div class="period">${item.issueNumber.slice(-5)}</div>
      <div class="number">${item.number}</div>
      <div class="category ${cls}">${cat}</div>
      <div class="color">${getColor(col)}</div>
    </div>`;
  });

  document.getElementById('grid').innerHTML = html;

  const total = list.length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="label">Total</div><div class="value">${total}</div></div>
    <div class="stat-box"><div class="label">BIG</div><div class="value" style="color:#e74c3c">${big}</div></div>
    <div class="stat-box"><div class="label">SMALL</div><div class="value" style="color:#3498db">${small}</div></div>
    <div class="stat-box"><div class="label">BIG%</div><div class="value">${total ? (big/total*100).toFixed(1) : 0}%</div></div>
  `;
}

fetchData();
</script>
</body>
</html>
