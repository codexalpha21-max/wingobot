version: "3.8"

services:
  api:
    build: .
    container_name: pyapi
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - WORKERS=1
      - WINGOBOT_TOKEN=${WINGOBOT_TOKEN:-}
      - PYAPI_DATA_DIR=/app/data
    volumes:
      - pyapi_data:/app/data
    restart: unless-stopped

volumes:
  pyapi_data:
